# ============================================
# Hugo 站点配置文件
# ============================================
# 技术栈: Hugo v0.146+
# 主题: 基于 PaperMod 自定义
# 参考: hugo-book 三栏布局
# ============================================

# 基础站点配置
baseURL = 'https://rabitsir.icu/test-Hugo-theme/'
languageCode = 'zh-CN'
title = 'Tech Explorer'
theme = 'custom-Hugo-theme'

# 时区设置
timeZone = 'Asia/Shanghai'

# 分页设置
[pagination]
pagerSize = 10

# 站点参数
[params]
# 站点描述
description = '热爱技术，探索无限可能 | 全栈开发者 | 航空爱好者'

# 主内容类型（用于归档、RSS等）
mainSections = ['blogs', 'projects', 'notes']

# 作者信息
author = 'Tech Explorer'

# 关键词
keywords = ['技术博客', '全栈开发', 'Hugo', 'PaperMod']

# 版权信息
copyright = '© 2025 Tech Explorer. All rights reserved.'

# 备案信息
beian = '京ICP备XXXXXXXX号'

# ============================================
# Profile Mode 配置 (PaperMod 特色)
# ============================================
[params.profileMode]
enabled = true
title = 'Tech Explorer'
subtitle = '热爱技术，探索无限可能 | 全栈开发者 | 航空爱好者'
imageUrl = 'https://api.dicebear.com/7.x/avataaars/svg?seed=tech'
imageTitle = 'Avatar'
imageWidth = 160
imageHeight = 160

# 主页按钮
[[params.profileMode.buttons]]
name = 'About'
url = '/about/'
[[params.profileMode.buttons]]
name = 'Blogs'
url = '/blogs/'
[[params.profileMode.buttons]]
name = 'Notes'
url = '/notes/'
[[params.profileMode.buttons]]
name = 'Projects'
url = '/projects/'
[[params.profileMode.buttons]]
name = 'Archive'
url = '/archive/'

# ============================================
# 社交链接配置
# ============================================
[[params.socialIcons]]
name = 'github'
url = 'https://github.com'
title = 'GitHub'
[[params.socialIcons]]
name = 'bilibili'
url = 'https://bilibili.com'
title = 'Bilibili'
[[params.socialIcons]]
name = 'xiaohongshu'
url = 'https://xiaohongshu.com'
title = '小红书'
[[params.socialIcons]]
name = 'telegram'
url = 'https://telegram.org'
title = 'Telegram'
[[params.socialIcons]]
name = 'taobao'
url = 'https://taobao.com'
title = '淘宝'

# ============================================
# 搜索配置
# ============================================
[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

# ============================================
# 主题功能开关
# ============================================
ShowReadingTime = true                # 显示阅读时间
ShowShareButtons = true               # 显示分享按钮
ShowPostNavLinks = true               # 显示文章导航
ShowBreadCrumbs = true                # 显示面包屑
ShowCodeCopyButtons = true            # 显示代码复制按钮
ShowWordCount = true                  # 显示字数统计
ShowRssButtonInSectionTermList = true
ShowToc = true                        # 显示目录
TocOpen = false                       # 目录默认折叠

# 使用本地托管的文件
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true

# 目录深度
TocSide = 'right'

# ============================================
# 菜单配置
# ============================================
[menu]
# 主菜单（在Profile Mode中不使用，但保留配置）
[[menu.main]]
identifier = 'about'
name = '关于'
url = '/about/'
weight = 10
[[menu.main]]
identifier = 'blogs'
name = '博客'
url = '/blogs/'
weight = 20
[[menu.main]]
identifier = 'notes'
name = '笔记'
url = '/notes/'
weight = 30
[[menu.main]]
identifier = 'projects'
name = '项目'
url = '/projects/'
weight = 40
[[menu.main]]
identifier = 'archive'
name = '归档'
url = '/archive/'
weight = 50

# ============================================
# 输出格式配置
# ============================================
[outputs]
home = ['HTML', 'RSS', 'JSON']
page = ['HTML']
section = ['HTML', 'RSS']

# ============================================
# Markdown 渲染配置
# ============================================
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true # 允许原始HTML

# ============================================
# Front Matter 默认配置
# ============================================
[frontmatter]
date = ['date', ':default']
lastmod = ['lastmod', ':default']
expiryDate = ['expiryDate']
publishDate = ['publishDate']
# 默认日期为 1949-10-01
[params.defaultDate]
year = 1949
month = 10
day = 1
[markup.highlight]
style = 'github'
lineNos = true
codeFences = true
guessSyntax = true
lineNumbersInTable = true
noClasses = false
